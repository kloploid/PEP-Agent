x-backend-env: &backend-env
  AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:?set in .env}
  AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:?set in .env}
  AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-5.4-nano}
  AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2025-01-01-preview}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2}
  QDRANT_URL: http://qdrant:6333
  QDRANT_COLLECTION: ${QDRANT_COLLECTION:-pep_docs}

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: pep-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  ingester:
    build: ./backend
    container_name: pep-ingester
    command: ["python", "ingest.py"]
    environment:
      <<: *backend-env
      FORCE_REINGEST: ${FORCE_REINGEST:-}
    volumes:
      - ./backend:/app
      - fastembed_cache:/app/.fastembed_cache
    depends_on:
      qdrant:
        condition: service_healthy
    restart: "no"

  backend:
    build: ./backend
    container_name: pep-backend
    ports:
      - "8000:8000"
    environment:
      <<: *backend-env
      CORS_ORIGINS: http://localhost:3000
    volumes:
      - ./backend:/app
      - fastembed_cache:/app/.fastembed_cache
    depends_on:
      qdrant:
        condition: service_healthy
      ingester:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 10

  frontend:
    build: ./frontend
    container_name: pep-frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy

volumes:
  qdrant_data:
  fastembed_cache:
